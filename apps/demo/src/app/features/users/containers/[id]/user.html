@defer (when resource.hasValue()) {
  @if (resource.value()) {
    <app-user-detail
      [mode]="mode()"
      [user]="resource.value()!"
      (new)="onNew()"
      (edit)="onEdit()"
      (cancel)="onCancel()"
      (save)="onSave($event)"
    />
  }
} @loading (minimum 2s) {
  <app-spinner />
}
