@for (user of users(); track user.id) {
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ user.firstName }} {{ user.lastName }}</mat-card-title>
      <mat-card-subtitle>{{ user.jobTitle }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div><mat-icon>email</mat-icon> {{ user.email }}</div>
      <div><mat-icon>phone</mat-icon> {{ user.phone }}</div>
    </mat-card-content>

    <mat-card-actions>
      <a
        [routerLink]="['/users', user.id]"
        mat-button
        >View Profile</a
      >
    </mat-card-actions>
  </mat-card>
}
