<header>
  <div class="header-start">
    <app-view-toggle
      [value]="selectedViewMode()"
      (valueChange)="onViewModeChange($event)" />
  </div>

  <div class="header-end">
    <app-active-status-toggle
      [value]="selectedActive()"
      (valueChange)="selectedActive.set($event)" />

    <app-gender-toggle
      [value]="selectedGender()"
      (valueChange)="selectedGender.set($event)" />

    <app-product-type-select
      multiple
      class="type-filter"
      [value]="selectedType()"
      (valueChange)="selectedType.set($event)" />
  </div>
</header>

@switch (selectedViewMode()) {
  @case ('cards') {
    <app-product-cards [products]="products()" />
  }
  @case ('table') {
    <app-product-table
      [products]="products()"
      (productChange)="updateProduct($event)" />
  }
}
