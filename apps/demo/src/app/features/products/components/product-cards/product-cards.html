@for (product of products(); track product.id) {
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ product.name }}</mat-card-title>
      <mat-card-subtitle>{{ product.productType }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <p>{{ product.description }}</p>
      <div class="meta">
        <mat-chip-set aria-label="Product details">
          <mat-chip class="price">${{ product.price }}</mat-chip>
          <mat-chip>{{ product.gender }}</mat-chip>
        </mat-chip-set>
      </div>
    </mat-card-content>

    <mat-card-actions>
      <a
        [routerLink]="['/products', product.id]"
        mat-button>
        View Details
      </a>
    </mat-card-actions>
  </mat-card>
}
