<app-header (settingsButtonClick)="isOpened.set(true)" />
@defer (when isBrowser) {
  @defer (when displaySearchDialog(); prefetch on idle) {
    @if (displaySearchDialog()) {
      <ds-command-palette (close)="displaySearchDialog.set(false)" />
    }
  }
}
<main>
  <router-outlet />
</main>

<ds-nav-drawer
  [opened]="isOpened()"
  (close)="isOpened.set(false)"></ds-nav-drawer>
