<mat-form-field>
  <mat-label>State</mat-label>
  <mat-select
    [disabled]="disabled()"
    [multiple]="multiple()"
    [value]="value()"
    (valueChange)="onChange($event)">
    @for (state of states(); track state.id) {
      <mat-option [value]="state.id">{{ state.name }}</mat-option>
    }
  </mat-select>
</mat-form-field>
