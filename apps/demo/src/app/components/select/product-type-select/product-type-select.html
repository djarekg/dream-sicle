<mat-form-field>
  <mat-label>Product types</mat-label>
  <mat-select
    [multiple]="multiple()"
    [value]="value()"
    (valueChange)="onChange($event)">
    @for (type of productTypes; track type) {
      <mat-option [value]="type">{{ type | titlecase }}</mat-option>
    }
  </mat-select>
</mat-form-field>
