packages:
  - apps/*
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  '@prisma/engines': true
  bcryptjs: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  prisma: true

catalog:
  '@angular/build': ^21.2.5
  '@angular/cdk': ^21.2.4
  '@angular/cli': ^21.2.4
  '@angular/common': ^21.2.0
  '@angular/compiler': ^21.2.0
  '@angular/compiler-cli': ^21.2.0
  '@angular/core': ^21.2.0
  '@angular/forms': ^21.2.0
  '@angular/material': ^21.2.4
  '@angular/platform-browser': ^21.2.0
  '@angular/platform-server': ^21.2.0
  '@angular/router': ^21.2.0
  '@angular/ssr': ^21.2.5
  '@types/node': latest
  dotenv: ^17.3.1
  ng-packagr: ^21.2.0
  ngx-cookie-service-ssr: ^21.3.1
  tslib: ^2.8.1
  typescript: 6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@0.1.12
  vite-plus: ^0.1.14
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.12

catalogMode: prefer
overrides:
  typescript: 'catalog:'
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - typescript
    - vite
    - vitest
  allowedVersions:
    typescript: '*'
    vite: '*'
    vitest: '*'
