packages:
  - apps/*
  - packages/*

allowBuilds:
  "@parcel/watcher": true
  "@prisma/engines": true
  bcryptjs: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  prisma: true

catalog:
  "@angular/build": 22.0.0-next.6
  "@angular/cdk": 22.0.0-next.3
  "@angular/cli": 22.0.0-next.3
  "@angular/common": 22.0.0-next.6
  "@angular/compiler": 22.0.0-next.6
  "@angular/compiler-cli": 22.0.0-next.6
  "@angular/core": 22.0.0-next.6
  "@angular/forms": 22.0.0-next.6
  "@angular/material": 22.0.0-next.3
  "@angular/platform-browser": 22.0.0-next.6
  "@angular/platform-server": 22.0.0-next.6
  "@angular/router": 22.0.0-next.6
  "@angular/ssr": 22.0.0-next.6
  "@types/node": latest
  dotenv: ^17.3.1
  happy-dom: ~20.8.4
  ng-packagr: 22.0.0-next.6
  ngx-cookie-service-ssr: ^21.3.1
  tslib: ^2.8.1
  typescript: 6.0.2
  vite: npm:@voidzero-dev/vite-plus-core@0.1.12
  vite-plus: ^0.1.14
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.12

catalogMode: prefer
overrides:
  typescript: "catalog:"
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - typescript
    - vite
    - vitest
  allowedVersions:
    typescript: "*"
    vite: "*"
    vitest: "*"
