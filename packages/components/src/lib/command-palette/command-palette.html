<dialog
  closedby="any"
  [open]="open()"
  (close)="onClosed()">
  <header>
    <mat-icon>search</mat-icon>
    <input
      autofocus
      type="text"
      placeholder="Type a command..."
      (keydown)="onInputKeydown($event)"
      (input)="onInput($event.target.value)"
    />
    <span class="shortcut">enter</span>
  </header>

  @let list = items(); @if (list.length > 0) {
  <div class="content app-scroll-track-transparent">
    <div ngListbox>
      @for (item of list; track item.id) {
      <a
        ngOption
        [value]="item.id"
        [routerLink]="item.href">
        <div matListItemMeta>
          <mat-icon>{{ item.icon }}</mat-icon>
        </div>
        <span
          matListItemTitle
          [innerHTML]="item.title"></span>
        <span
          matListItemLine
          [innerHTML]="item.description ?? '' | safeHtml"></span>
      </a>
      }
    </div>
  </div>
  }
</dialog>
